<!DOCTYPE html>
<html>
<head>
  <title>Trackex</title>
  <link rel="stylesheet" href="partslog.css">

</head>

<body>
  <div id="headBox">
  <h1>finance tracker</h1>
  <p></p> Track and Visualize your Expenses</p>

  </div>
 <div id="amountBox">   
<h2>enter the amount</h2>
<input type="text" id="value" > 
<br>
<h2> pick a category</h2>
<input list="categories" id="category" placeholder="select or type">
  <datalist id="categories">
    <option value="rent">
    <option value="food">
  <option value="transit">
  </datalist>
 <br>

<button id ="punch">punch</button>
 </div>

<div id="secondBox">

  <br>
   <output for="value category" name="result" id="result"> </output>
</div>

<div id="graphBox">
<canvas id="myChart"></canvas>
<button id ="renderGraphBtn">renderGraph</button>
</div>
<div id="deleteBox">
  <h2>delete</h2>
 
<br>
  <input type="text" id="deletetxt">
  <button id="deleteBtn">delete</button>
  <br>
  <input type="date" id="date" min="2026-01-01" max="2026-12-31" >
</div >
<div id="emailBox">
 <input type="email" id="emailaddress" placeholder="please enter an email"please enter an email"><button  id="shareBtn"><a href="mailto:"></a>share</button>
</div>

</body>
</html>
